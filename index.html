<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header class="topo">
      <h1>Gerenciador de Tarefas</h1>
    </header>

    <section class="conteudo">
      <div class="card nova-tarefa">
        <h2>Nova Tarefa</h2>

        <div class="formulario">
          <input id="inputTarefa" type="text" placeholder="Digite uma tarefa...">
          <button onclick="adicionarTarefa()">Adicionar</button>
        </div>
      </div>

      <div class="area-titulo">
        <h2>Suas Tarefas</h2>

        <div class="resumo">
          <span>Total: <strong id="total">0</strong> tarefas</span>
          <span>|</span>
          <span>Pendentes: <strong id="pendentes">0</strong></span>
          <span>|</span>
          <span>Concluídas: <strong id="concluidas">0</strong></span>
        </div>
      </div>

      <ul id="listaTarefas" class="lista"></ul>

  
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
